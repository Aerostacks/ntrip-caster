name: Docker Build & Push

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/aerostacks/ntrip-caster

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: r2d2
            platform: linux/amd64
          - runner: avalanche
            platform: linux/arm64
    runs-on: [self-hosted, "${{ matrix.runner }}"]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push (arch-specific)
        run: |
          BRANCH="${GITHUB_REF##*/}"
          ARCH_SUFFIX="${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}"
          DOCKER_BUILDKIT=1 docker buildx build \
            --platform "${{ matrix.platform }}" \
            --build-arg BUILD_BRANCH="${BRANCH}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg BUILD_SHA="${GITHUB_SHA::7}" \
            --tag "${IMAGE}:${BRANCH}-${ARCH_SUFFIX}" \
            --push \
            .

  manifest:
    needs: build
    runs-on: [self-hosted, r2d2]
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Create and push multi-arch manifest
        run: |
          BRANCH="${GITHUB_REF##*/}"
          SHA="${GITHUB_SHA::7}"
          for TAG in "${BRANCH}" "${BRANCH}-${SHA}"; do
            docker buildx imagetools create \
              --tag "${IMAGE}:${TAG}" \
              "${IMAGE}:${BRANCH}-amd64" \
              "${IMAGE}:${BRANCH}-arm64"
          done
